name: Daily Analytics Update

on:
  schedule:
    - cron: '0 0 * * *' # Run at 00:00 everyday
  workflow_dispatch: # Allow manual trigger

jobs:
  update-analytics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Analytics Key JSON
        run: echo '${{ secrets.GA4_SERVICE_ACCOUNT }}' > .secret_ga4_key.json

      - name: Fetch Analytics & Build Site
        env:
          GOOGLE_APPLICATION_CREDENTIALS: .secret_ga4_key.json
        run: |
          node scripts/fetch-analytics.js
          npm run build

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add content/data/analytics.json *.html sitemap.xml
          git commit -m "chore: daily analytics update" || echo "No changes to commit"
          git push origin HEAD:main
